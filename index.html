<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
    <title>NoteBox - 音符盒子</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
    </script>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel-bg: #141414;
            --panel2: #1a1a1a;
            --accent: #888;
            --accent-light: #bbb;
            --accent-bright: #fff;
            --text: #c0c0c0;
            --text2: #888;
            --text3: #666;
            --border: #2a2a2a;
            --border-bright: #444;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.7);
            --radius: 8px;
            --radius-sm: 6px;
            --radius-lg: 10px;
            --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            --note-color: #d0d0d0;
            --note-hover: #fff;
            --playhead-color: #fff;
            --judge-line: #ccc;
            --wave-color: #555;
            --wave-fill: rgba(180, 180, 180, 0.25);
            --perfect-color: #ffc107;
            --good-color: #4488ff;
            --bad-color: #ff4444;
            --miss-color: #ff3333;
            --hold-color: #44ccff;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
        }
        .status-bar {
            background: var(--panel-bg);
            padding: 3px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.64em;
            color: var(--text2);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            min-height: 22px;
            flex-shrink: 0;
            z-index: 10;
        }
        .status-bar span {
            white-space: nowrap;
        }
        .status-bar .highlight {
            color: #ddd;
            font-weight: 700;
        }
        .status-bar .dot {
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            margin-right: 2px;
            vertical-align: middle;
        }
        .dot.recording {
            background: #ff5555;
            animation: blink 0.6s infinite;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.2;
            }
        }
        .main-container {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #060606;
            min-height: 0;
        }
        .canvas-wrapper {
            flex: 1;
            position: relative;
            background: #060606;
            overflow: hidden;
            cursor: crosshair;
            min-height: 0;
        }
        .canvas-wrapper.play-mode {
            cursor: pointer;
        }
        .canvas-wrapper.assist-mode {
            cursor: cell;
        }
        .canvas-wrapper.auto-play-cursor {
            cursor: default;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .overlay-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.95em;
            pointer-events: none;
            text-align: center;
            letter-spacing: 0.4px;
            z-index: 5;
            transition: opacity 0.35s;
            font-weight: 500;
            padding: 10px 20px;
        }
        .home-panel {
            position: absolute;
            inset: 0;
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 24px 16px;
            overflow-y: auto;
            background: var(--bg);
            -webkit-overflow-scrolling: touch;
        }
        .home-panel.hidden {
            display: none;
        }
        .home-panel .home-title {
            font-size: 1.7em;
            font-weight: 900;
            color: #fff;
            letter-spacing: 1px;
            margin-bottom: 4px;
            text-align: center;
        }
        .home-panel .home-subtitle {
            font-size: 0.78em;
            color: #777;
            margin-bottom: 22px;
            text-align: center;
            letter-spacing: 0.4px;
        }
        .home-panel .home-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 22px;
        }
        .home-panel .home-btn {
            padding: 12px 26px;
            border-radius: var(--radius-lg);
            font-size: 0.9em;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid #444;
            background: #1a1a1a;
            color: #ddd;
            letter-spacing: 0.4px;
            transition: all 0.2s;
            font-family: var(--font);
            text-align: center;
            min-width: 120px;
        }
        .home-panel .home-btn:hover {
            border-color: #888;
            color: #fff;
            background: #222;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }
        .home-panel .home-btn.primary {
            border-color: #666;
            background: #1f1f1f;
            color: #fff;
        }
        .home-panel .section-title {
            font-weight: 700;
            color: #aaa;
            font-size: 0.8em;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            text-align: center;
            width: 100%;
            max-width: 580px;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 8px;
        }
        .home-panel .project-list {
            width: 100%;
            max-width: 580px;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }
        .home-panel .project-item {
            background: #141414;
            border: 1.5px solid #2a2a2a;
            border-radius: var(--radius);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .home-panel .project-item:hover {
            border-color: #555;
            background: #1a1a1a;
        }
        .home-panel .project-item .proj-cover {
            width: 42px;
            height: 32px;
            border-radius: 4px;
            object-fit: cover;
            background: #1f1f1f;
            border: 1px solid #333;
            flex-shrink: 0;
        }
        .home-panel .project-item .proj-info {
            flex: 1;
            min-width: 0;
        }
        .home-panel .project-item .proj-name {
            font-weight: 700;
            color: #ddd;
            font-size: 0.85em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .home-panel .project-item .proj-meta {
            font-size: 0.65em;
            color: #777;
            margin-top: 2px;
        }
        .home-panel .project-item .proj-actions {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }
        .home-panel .project-item .proj-actions button {
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            font-size: 0.65em;
            cursor: pointer;
            border: 1.5px solid #333;
            background: #1a1a1a;
            color: #bbb;
            font-weight: 600;
            transition: all 0.15s;
            font-family: var(--font);
        }
        .home-panel .project-item .proj-actions button:hover {
            border-color: #666;
            color: #fff;
            background: #222;
        }
        .home-panel .project-item .proj-actions button.delete-btn:hover {
            border-color: #555;
            color: #ff6666;
            background: #1f1818;
        }
        .home-panel .empty-hint {
            color: #555;
            font-size: 0.75em;
            text-align: center;
            padding: 18px;
        }
        .calibration-overlay {
            position: absolute;
            inset: 0;
            background: rgba(6, 6, 6, 0.94);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px;
            pointer-events: all;
        }
        .calibration-overlay.hidden {
            display: none;
        }
        .calibration-overlay .cal-title {
            font-size: 1.2em;
            font-weight: 800;
            color: #fff;
            letter-spacing: 0.8px;
        }
        .calibration-overlay .cal-subtitle {
            font-size: 0.75em;
            color: #888;
            text-align: center;
            max-width: 380px;
            line-height: 1.5;
        }
        .calibration-overlay .cal-cover {
            width: 120px;
            height: 90px;
            border-radius: var(--radius);
            object-fit: cover;
            border: 2px solid #444;
            background: #1a1a1a;
            display: none;
        }
        .calibration-overlay .cal-cover.visible {
            display: block;
        }
        .calibration-overlay .cal-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .calibration-overlay label {
            color: #bbb;
            font-weight: 600;
            font-size: 0.8em;
        }
        .calibration-overlay input[type="range"] {
            width: 140px;
            accent-color: #999;
            height: 16px;
        }
        .calibration-overlay .cal-val {
            color: #fff;
            font-weight: 700;
            font-size: 0.85em;
            min-width: 40px;
            text-align: center;
        }
        .calibration-overlay button {
            background: #2a2a2a;
            color: #ddd;
            border: 2px solid #444;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.82em;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: all 0.2s;
            font-family: var(--font);
        }
        .calibration-overlay button:hover {
            background: #333;
            border-color: #777;
            color: #fff;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            transform: translateY(-1px);
        }
        .calibration-overlay button.secondary {
            background: transparent;
            border: 2px solid #444;
            color: #aaa;
        }
        .calibration-overlay button.secondary:hover {
            border-color: #777;
            color: #fff;
        }
        .calibration-overlay .auto-play-cal-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78em;
            color: #ff9999;
            cursor: pointer;
            font-weight: 600;
        }
        .calibration-overlay .auto-play-cal-label input {
            width: 16px;
            height: 16px;
            accent-color: #ff5555;
            cursor: pointer;
        }
        .toolbar {
            background: var(--panel-bg);
            padding: 6px 10px;
            padding-bottom: calc(6px + var(--safe-bottom));
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
            border-top: 1.5px solid var(--border);
            z-index: 20;
            box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.5);
            min-height: 42px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            flex-shrink: 0;
        }
        .toolbar::-webkit-scrollbar {
            display: none;
        }
        .toolbar .brand {
            font-weight: 900;
            font-size: 1em;
            color: var(--accent-bright);
            letter-spacing: 0.3px;
            white-space: nowrap;
            margin-right: 2px;
            flex-shrink: 0;
        }
        .toolbar button {
            background: var(--panel2);
            color: #b0b0b0;
            border: 1.5px solid #333;
            padding: 5px 9px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.73em;
            font-weight: 600;
            transition: all 0.15s;
            white-space: nowrap;
            letter-spacing: 0.2px;
            font-family: var(--font);
            flex-shrink: 0;
            min-height: 30px;
        }
        .toolbar button:hover {
            border-color: #666;
            color: #fff;
            background: #1f1f1f;
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.5);
        }
        .toolbar button:active {
            transform: scale(0.95);
            transition: transform 0.06s;
        }
        .toolbar button.active {
            border-color: #888 !important;
            color: #fff !important;
            background: #252525 !important;
            box-shadow: 0 0 12px rgba(180, 180, 180, 0.25);
        }
        .toolbar .sep {
            width: 1px;
            height: 18px;
            background: #2e2e2e;
            margin: 0 2px;
            border-radius: 1px;
            flex-shrink: 0;
        }
        .toolbar label {
            font-size: 0.7em;
            color: var(--text2);
            white-space: nowrap;
            font-weight: 500;
            letter-spacing: 0.2px;
            flex-shrink: 0;
        }
        .toolbar input[type="number"],
        .toolbar input[type="range"] {
            background: #0f0f0f;
            color: #ddd;
            border: 1.5px solid #333;
            padding: 4px 5px;
            border-radius: var(--radius-sm);
            font-size: 0.73em;
            text-align: center;
            font-weight: 600;
            font-family: var(--font);
            width: 44px;
            flex-shrink: 0;
            min-height: 28px;
        }
        .toolbar input[type="number"]:focus {
            border-color: #777;
            outline: none;
        }
        .toolbar input[type="range"] {
            width: 50px;
            padding: 0;
            height: 18px;
            cursor: pointer;
            accent-color: #999;
        }
        .toolbar input[type="file"] {
            display: none;
        }
        .toolbar .btn-icon {
            font-size: 0.9em;
            padding: 4px 7px;
            min-width: 28px;
            text-align: center;
        }
        .toolbar .btn-back {
            background: transparent;
            border: 1.5px solid #444;
            color: #aaa;
            font-weight: 700;
        }
        .toolbar .btn-back:hover {
            border-color: #777;
            color: #fff;
        }
        .toolbar .sub-nav-label {
            font-weight: 700;
            color: #ddd;
            font-size: 0.75em;
            letter-spacing: 0.4px;
            margin: 0 2px;
            flex-shrink: 0;
        }
        .toolbar .cover-thumb {
            width: 26px;
            height: 18px;
            border-radius: 3px;
            object-fit: cover;
            border: 1.5px solid #444;
            cursor: pointer;
            display: none;
            flex-shrink: 0;
        }
        .toolbar .cover-thumb.visible {
            display: inline-block;
        }
        .toolbar .allow-edit-label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7em;
            color: #bbb;
            cursor: pointer;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .toolbar .allow-edit-label input {
            width: 15px;
            height: 15px;
            accent-color: #999;
            cursor: pointer;
        }
        .toolbar .auto-play-label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7em;
            color: #ff8888;
            cursor: pointer;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .toolbar .auto-play-label input {
            width: 15px;
            height: 15px;
            accent-color: #ff5555;
            cursor: pointer;
        }
        .copyright-bar {
            background: #0d0d0d;
            padding: 4px 12px;
            padding-bottom: calc(4px + var(--safe-bottom));
            text-align: center;
            font-size: 0.58em;
            color: #555;
            letter-spacing: 0.3px;
            border-top: 1px solid #1a1a1a;
            flex-shrink: 0;
            min-height: 20px;
            line-height: 1.4;
        }
        .judgment-popup {
            position: fixed;
            pointer-events: none;
            font-weight: 900;
            font-size: 1.5em;
            z-index: 100;
            animation: popUp 0.5s ease-out forwards;
            text-shadow: 0 0 14px currentColor;
            letter-spacing: 1px;
        }
        @keyframes popUp {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) translateY(-55px) scale(0.6);
            }
        }
        .toast-msg {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 700;
            z-index: 200;
            pointer-events: none;
            animation: toastIn 0.3s ease-out, toastOut 0.3s 1.4s ease-in forwards;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
            font-size: 0.78em;
            font-family: var(--font);
            text-align: center;
            max-width: 90vw;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-12px);
            }
        }
        .custom-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .custom-modal {
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: var(--radius-lg);
            padding: 20px 22px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8);
            text-align: center;
        }
        .custom-modal .modal-title {
            font-weight: 800;
            color: #fff;
            font-size: 1em;
            margin-bottom: 8px;
            letter-spacing: 0.4px;
        }
        .custom-modal .modal-msg {
            color: #bbb;
            font-size: 0.82em;
            line-height: 1.5;
            margin-bottom: 16px;
            word-break: break-word;
            white-space: pre-line;
        }
        .custom-modal .modal-input {
            width: 100%;
            background: #0f0f0f;
            border: 1.5px solid #444;
            color: #ddd;
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.85em;
            font-family: var(--font);
            margin-bottom: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .custom-modal .modal-input:focus {
            border-color: #888;
        }
        .custom-modal .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .custom-modal .modal-buttons button {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.8em;
            border: 2px solid #444;
            background: #222;
            color: #ddd;
            transition: all 0.2s;
            font-family: var(--font);
            letter-spacing: 0.3px;
        }
        .custom-modal .modal-buttons button:hover {
            border-color: #888;
            color: #fff;
            background: #2a2a2a;
        }
        .custom-modal .modal-buttons button.primary-btn {
            border-color: #666;
            background: #2a2a2a;
            color: #fff;
        }
        .custom-modal .modal-buttons button.danger-btn:hover {
            border-color: #ff5555;
            color: #ff6666;
            background: #1f1818;
        }
        .result-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.82);
            z-index: 310;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .result-modal {
            background: #1a1a1a;
            border: 2px solid #555;
            border-radius: var(--radius-lg);
            padding: 22px 20px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 14px 48px rgba(0, 0, 0, 0.85);
            text-align: center;
            pointer-events: auto;
        }
        .result-modal .result-title {
            font-weight: 900;
            color: #fff;
            font-size: 1.15em;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .result-modal .result-grade {
            font-weight: 900;
            font-size: 2em;
            color: #ffc107;
            margin: 4px 0 8px;
            letter-spacing: 1px;
        }
        .result-modal .result-info {
            color: #bbb;
            font-size: 0.78em;
            line-height: 1.7;
            margin-bottom: 12px;
            white-space: pre-line;
            text-align: left;
            display: inline-block;
        }
        .result-modal .result-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .result-modal .result-buttons button {
            padding: 7px 16px;
            border-radius: 18px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.73em;
            border: 2px solid #444;
            background: #222;
            color: #ddd;
            transition: all 0.2s;
            font-family: var(--font);
            letter-spacing: 0.3px;
            pointer-events: auto;
            z-index: 315;
        }
        .result-modal .result-buttons button:hover {
            border-color: #888;
            color: #fff;
            background: #2a2a2a;
        }
        .result-modal .result-buttons button.primary-btn {
            border-color: #666;
            background: #2a2a2a;
            color: #fff;
        }
        .result-modal .result-buttons button.share-btn {
            border-color: #5588cc;
            color: #88bbff;
            background: #1a2230;
        }
        .result-modal .result-buttons button.share-btn:hover {
            border-color: #77aadd;
            color: #aaddff;
            background: #1f2a3a;
        }
        .result-modal .result-buttons button.save-btn {
            border-color: #cc8855;
            color: #ffbb88;
            background: #1f1a14;
        }
        .result-modal .result-buttons button.save-btn:hover {
            border-color: #ddaa77;
            color: #ffcc99;
            background: #2a2218;
        }
        .result-modal .result-buttons button:disabled {
            opacity: 0.4;
            cursor: not-allowed;

            let audioBuffer = null;

            const SHARE_TEXT = '你能打多少呢？快来音符盒子体验吧！网址：https://xiaoye6661234.github.io/NoteBox';
            const DB_NAME = 'NoteBoxDB';
            const DB_VERSION = 3;
            let db = null;

            function isHoldNote(note) { return note !== null && typeof note === 'object' && typeof note.t === 'number' &&
                    typeof note.d === 'number'; }

            function getNoteTime(note) { return isHoldNote(note) ? note.t : (typeof note === 'number' ? note : 0); }

            function getNoteDuration(note) { return isHoldNote(note) ? (note.d || 0) : 0; }

            function getNoteEndTime(note) { return getNoteTime(note) + getNoteDuration(note); }

            function normalizeNote(note) { return isHoldNote(note) ? { t: note.t, d: Math.max(0.05, note.d || 0.2) } : (typeof note ===
                    'number' ? note : null); }

            function notesEqual(a, b) { if (isHoldNote(a) && isHoldNote(b)) return Math.abs(a.t - b.t) < 0.0001 && Math.abs(a.d -
                    b.d) < 0.0001; if (!isHoldNote(a) && !isHoldNote(b)) return Math.abs((typeof a === 'number' ? a : 0) - (
                    typeof b === 'number' ? b : 0)) < 0.0001; return false; }

            function openDB() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(DB_NAME, DB_VERSION);
                    req.onupgradeneeded = (e) => {
                        const d = e.target.result;
                        if (!d.objectStoreNames.contains('projects')) d.createObjectStore('projects', { keyPath: 'id' });
                        if (!d.objectStoreNames.contains('recentPlays')) d.createObjectStore('recentPlays', { keyPath: 'id' });
                    };
                    req.onsuccess = (e) => { db = e.target.result;
                        resolve(db); };
                    req.onerror = () => reject(req.error);
                });
            }
            async function saveProjectToDB(projectData) {
                if (!db) await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction('projects', 'readwrite');
                    const store = tx.objectStore('projects');
                    const data = { ...projectData, updatedAt: Date.now() };
                    if (!data.id) data.id = 'proj_' + Date.now();
                    if (!data.createdAt) data.createdAt = Date.now();
                    const req = store.put(data);
                    req.onsuccess = () => resolve(data.id);
                    req.onerror = () => reject(req.error);
                });
            }
            async function getAllProjects() {
                if (!db) await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction('projects', 'readonly');
                    const store = tx.objectStore('projects');
                    const req = store.getAll();
                    req.onsuccess = () => resolve(req.result || []);
                    req.onerror = () => reject(req.error);
                });
            }
            async function getProject(id) {
                if (!db) await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction('projects', 'readonly');
                    const store = tx.objectStore('projects');
                    const req = store.get(id);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            }
            async function deleteProjectFromDB(id) {
                if (!db) await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction('projects', 'readwrite');
                    const store = tx.objectStore('projects');
                    const req = store.delete(id);
                    req.onsuccess = () => resolve();
                    req.onerror = () => reject(req.error);
                });
            }
            async function saveRecentPlay(data) {
                if (!db) await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction('recentPlays', 'readwrite');
                    const store = tx.objectStore('recentPlays');
                    const record = { ...data, id: data.id || ('rp_' + Date.now()), playedAt: Date.now() };
                    const req = store.put(record);
                    req.onsuccess = () => resolve(record.id);
                    req.onerror = () => reject(req.error);
                });
            }
            async function getAllRecentPlays() {
                if (!db) await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction('recentPlays', 'readonly');
                    const store = tx.objectStore('recentPlays');
                    const req = store.getAll();
                    req.onsuccess = () => resolve(req.result || []);
                    req.onerror = () => reject(req.error);
                });

            async function deleteRecentPlay(id) {
                if (!db) await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction('recentPlays', 'readwrite');
                    const store = tx.objectStore('recentPlays');
                    const req = store.delete(id);
                    req.onsuccess = () => resolve();
                    req.onerror = () => reject(req.error);
                });
            }

            function showCustomAlert(message, title = '提示') {
                return new Promise((resolve) => {
                    const overlay = document.createElement('div');
                    overlay.className = 'custom-modal-overlay';
                    overlay.innerHTML =
                        `<div class="custom-modal"><div class="modal-title">${escapeHTML(title)}</div><div class="modal-msg">${escapeHTML(message)}</div><div class="modal-buttons"><button class="primary-btn" id="modalOkBtn">确定</button></div></div>`;
                    document.body.appendChild(overlay);
                    const okBtn = overlay.querySelector('#modalOkBtn');
                    const closeOverlay = () => { if (overlay.parentNode) overlay.remove();
                        resolve(); };
                    okBtn.addEventListener('click', closeOverlay);
                    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeOverlay(); });
                });
            }
            function showCustomConfirm(message, title = '确认') {
                return new Promise((resolve) => {
                    const overlay = document.createElement('div');
                    overlay.className = 'custom-modal-overlay';
                    overlay.innerHTML =
                        `<div class="custom-modal"><div class="modal-title">${escapeHTML(title)}</div><div class="modal-msg">${escapeHTML(message)}</div><div class="modal-buttons"><button id="modalCancelBtn">取消</button><button class="primary-btn" id="modalConfirmBtn">确定</button></div></div>`;
                    document.body.appendChild(overlay);
                    const confirmBtn = overlay.querySelector('#modalConfirmBtn');
                    const cancelBtn = overlay.querySelector('#modalCancelBtn');
                    const closeWith = (val) => { if (overlay.parentNode) overlay.remove();
                        resolve(val); };
                    confirmBtn.addEventListener('click', () => closeWith(true));
                    cancelBtn.addEventListener('click', () => closeWith(false));
                    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeWith(false); });
                });
            }
            function showCustomPrompt(message, defaultValue = '', title = '输入') {
                return new Promise((resolve) => {
                    const overlay = document.createElement('div');
                    overlay.className = 'custom-modal-overlay';
                    overlay.innerHTML =
                        `<div class="custom-modal"><div class="modal-title">${escapeHTML(title)}</div><div class="modal-msg">${escapeHTML(message)}</div><input type="text" class="modal-input" id="modalInput" value="${escapeHTML(defaultValue)}" autocomplete="off"><div class="modal-buttons"><button id="modalCancelBtn">取消</button><button class="primary-btn" id="modalConfirmBtn">确定</button></div></div>`;
                    document.body.appendChild(overlay);
                    const input = overlay.querySelector('#modalInput');
                    input.focus();
                    input.select();
                    const closeWith = (val) => { if (overlay.parentNode) overlay.remove();
                        resolve(val); };
                    overlay.querySelector('#modalConfirmBtn').addEventListener('click', () => { const val = input.value
                            .trim();
                        closeWith(val || null); });
                    overlay.querySelector('#modalCancelBtn').addEventListener('click', () => closeWith(null));
                    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeWith(null); });
                    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { const val = input.value.trim();
                            closeWith(val || null); } if (e.key === 'Escape') { closeWith(null); } });
                });
            }

            function escapeHTML(str) { const div = document.createElement('div');
                div.textContent = str || ''; return div.innerHTML; }

            function formatDate(ts) { if (!ts) return ''; const d = new Date(ts); return d.getFullYear() + '-' + String(d.getMonth() +
                    1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + ' ' + String(d.getHours()).padStart(2,
                    '0') + ':' + String(d.getMinutes()).padStart(2, '0'); }

            function showPackDialog() {
                return new Promise((resolve) => {

                        <div class="custom-modal" style="max-width:440px;">

                            <input type="text" class="modal-input" id="packDescInput" value="${escapeHTML(chartData.description||'')}" autocomplete="off" style="margin-bottom:12px;" placeholder="简短描述此谱面">
                            <div class="modal-buttons">
                                <button id="packCancelBtn">取消</button>
                                <button class="primary-btn" id="packConfirmBtn">确认打包</button>
                            </div>
                        </div>`;
                    document.body.appendChild(overlay);
                    const nameInp = overlay.querySelector('#packNameInput');
                    const diffInp = overlay.querySelector('#packDifficultyInput');
                    const authInp = overlay.querySelector('#packAuthorInput');
                    const descInp = overlay.querySelector('#packDescInput');
                    nameInp.focus();
                    nameInp.select();
                    const closeWith = (val) => { if (overlay.parentNode) overlay.remove();
                        resolve(val); };
                    overlay.querySelector('#packConfirmBtn').addEventListener('click', () => { const pn = nameInp.value
                            .trim(); if (!pn) { showToast('包名不能为空'); return; } closeWith({ packageName: pn,
                            difficulty: diffInp.value.trim(), author: authInp.value.trim(), description: descInp.value
                                .trim() }); });
                    overlay.querySelector('#packCancelBtn').addEventListener('click', () => closeWith(null));
                    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeWith(null); });
                    [nameInp, diffInp, authInp, descInp].forEach(inp => inp.addEventListener('keydown', (e) => { if (e
                            .key === 'Enter') { overlay.querySelector('#packConfirmBtn').click(); } if (e.key ===
                            'Escape') { closeWith(null); } }));
                });

            function showResultModal(gs, grade, isAutoPlay) {
                return new Promise((resolve) => {
                    if (document.querySelector('.result-modal-overlay')) {
                        resolve('dismiss');
                        return;
                    }
                    const total = gs.totalNotes;
                    const scorePercent = total > 0 ? Math.round((gs.perfectCount * 100 + gs.goodCount * 60 + gs.badCount *
                        20) / (total * 100) * 100) : 0;
                    const infoLines = [
                        `曲名：${escapeHTML(chartData.audioFileName||currentProjectName||'未命名')}`,
                        `难度系数：${escapeHTML(chartData.difficulty||'未设置')}    作者：${escapeHTML(chartData.author||'匿名')}`,
                        `Perfect：${gs.perfectCount}    Good：${gs.goodCount}    Bad：${gs.badCount}`,
                        `Miss：${gs.missCount}`,
                        `最高连击次数：${gs.maxCombo}`,
                        `综合评分：${scorePercent} 分`
                    ].join('\n');
                    const allowEdit = chartData.allowEdit !== false;
                    const editBtnHtml = allowEdit ? '<button id="resBtnEdit" class="primary-btn">✏️ 返回编辑</button>' : '';
                    const badgeHtml = isAutoPlay ?
                        '<div class="autoplay-badge">🤖 自动游玩 · Autoplay</div>' :
                        '<div class="normal-play-badge">🎮 游玩 · Combo</div>';
                    const saveShareHtml = isAutoPlay ?
                        '<button id="resBtnSave" class="save-btn" disabled title="自动游玩成绩不可保存">💾 不可保存</button><button id="resBtnShare" class="share-btn" disabled title="自动游玩成绩不可分享">📤 不可分享</button>' :
                        '<button id="resBtnSave" class="save-btn">💾 保存成绩</button><button id="resBtnShare" class="share-btn">📤 分享成绩</button>';
                    const overlay = document.createElement('div');
                    overlay.className = 'result-modal-overlay';
                    overlay.innerHTML = `
                        <div class="result-modal">
                            <div class="result-title">🎯 结算</div>
                            <div class="result-grade">${grade}</div>
                            ${badgeHtml}
                            <div class="result-info">${infoLines}</div>
                            <div class="result-buttons">
                                <button id="resBtnHome">🏠 返回首页</button>
                                <button id="resBtnReplay" class="replay-btn">🔄 重新游玩</button>
                                ${editBtnHtml}
                                ${saveShareHtml}
                            </div>
                        </div>`;
                    document.body.appendChild(overlay);
                    let resolved = false;
                    const closeAndResolve = (action) => {
                        if (resolved) return;
                        resolved = true;
                        if (overlay.parentNode) overlay.remove();

                bgGrad.addColorStop(0, '#0f0f0f');
                bgGrad.addColorStop(1, '#1a1a1a');
                offCtx.fillStyle = bgGrad;
                offCtx.fillRect(0, 0, imgW, imgH);
                offCtx.fillStyle = '#fff';
                offCtx.font = 'bold 24px "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif';
                offCtx.textAlign = 'left';
                offCtx.fillText('音符盒子 NoteBox', 30, 48);
                offCtx.strokeStyle = 'rgba(255,255,255,0.25)';
                offCtx.lineWidth = 1;
                offCtx.beginPath();
                offCtx.moveTo(30, 62);
                offCtx.lineTo(imgW - 30, 62);
                offCtx.stroke();
                const infoX = 30;
                let infoY = 100;
                const lineH = 30;
                offCtx.fillStyle = '#ddd';
                offCtx.font = 'bold 18px "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif';
                offCtx.fillText('曲名：' + (chartData.audioFileName || currentProjectName || '未命名'), infoX, infoY);
                infoY += lineH;
                offCtx.fillText('难度系数：' + (chartData.difficulty || '未设置') + '    作者：' + (chartData.author || '匿名'),
                    infoX, infoY);
                infoY += lineH + 8;
                offCtx.fillText('Perfect：' + gs.perfectCount + '    Good：' + gs.goodCount + '    Bad：' + gs.badCount,
                    infoX, infoY);
                infoY += lineH;
                offCtx.fillText('Miss：' + gs.missCount, infoX, infoY);
                infoY += lineH;
                offCtx.fillText('最高连击次数：' + gs.maxCombo, infoX, infoY);
                infoY += lineH + 8;
                offCtx.fillStyle = '#ffc107';
                offCtx.font = 'bold 22px "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif';
                offCtx.fillText('综合评分：' + scorePercent + ' 分    评级：' + grade, infoX, infoY);
                offCtx.fillStyle = '#888';
                offCtx.font = '14px "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif';
                offCtx.fillText(SHARE_TEXT, 30, imgH - 50);
                if (coverImageDataUrl) {

                    const drawCover = () => { const cw = 140; const ch = 105;
                        offCtx.drawImage(coverImg, imgW - cw - 30, imgH - ch - 70, cw, ch);
                        offCtx.fillStyle = '#ccc';

                            currentProjectName || ''), imgW - 30, imgH - 58);

                    if (coverImg.complete) drawCover();

                }
                offCtx.textAlign = 'left';
                const dataUrl = offCanvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = dataUrl;
                a.download = 'NoteBox_成绩_' + (currentProjectName || 'result') + '.png';

                        rawBuf instanceof ArrayBuffer ? rawBuf : arr.buffer.slice(arr.byteOffset, arr.byteOffset + arr
                        .byteLength);
                    audioBuffer = await ctx.decodeAudioData(bufToDecode.slice(0));
                    originalAudioFile = new File([new Blob([arr])], fname || 'audio.mp3', { type: 'audio/*' });
                    originalAudioArrayBuffer = rawBuf instanceof ArrayBuffer ? rawBuf : null;
                    chartData.audioFileName = fname || 'audio.mp3'; } catch (e) { console.warn('音频数据解码失败', e); } }

            function loadHitSoundFromBase64(b64) { if (!b64) { hitSoundBuffer = null; return; } try { const parts = b64.split(','); const
                    base64Data = parts.length > 1 ? parts[1] : parts[0]; const binaryStr = atob(base64Data); const bytes = new
                    Uint8Array(binaryStr.length); for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(
                        i); const ctx = getAudioContext();
                    ctx.decodeAudioData(bytes.buffer.slice(bytes.byteOffset, bytes.byteOffset + bytes.byteLength), (buf) => {
                        hitSoundBuffer = buf; }, () => { hitSoundBuffer = null; }); } catch (e) { hitSoundBuffer = null; } }

            function finishHoldAdd() {
                if (!holdAddBtnIsPressing) return;
                holdAddBtnIsPressing = false;
                if (holdAddBtnTimeout) { clearTimeout(holdAddBtnTimeout);
                    holdAddBtnTimeout = null; }
                const elapsed = (Date.now() - holdAddBtnPressStart) / 1000;
                const dur = Math.max(0.08, elapsed);
                const btnEl = document.getElementById('btnAddHoldEl');
                if (btnEl) { btnEl.textContent = '🟦 按住添加Hold';
                    btnEl.style.borderColor = '#333';
                    btnEl.classList.remove('active'); }
                if (!audioBuffer) { showToast('⚠ 请先加载音乐'); return; }
                if (!notesSelectionActive) { showToast('⚠ 请先开启选中模式'); return; }
                const time = getCurrentPlayTime();
                if (time < getEffectiveStartTime() || time > getEffectiveEndTime()) { showToast('⚠ 播放头不在有效范围内'); return; }
                const endTime = time + dur;
                if (endTime > getEffectiveEndTime() + 0.1) { showToast('⚠ Hold音符超出音频范围'); return; }
                addHoldNote(time, dur);
                hoveredNoteIndex = findNearbyNote(time, 0.03);
                updateStatusBar();
                showToast('✅ 已添加Hold音符 ' + time.toFixed(2) + 's (持续' + dur.toFixed(2) + 's)');
            }

            async function editSelectedHoldDuration() {
                if (!notesSelectionActive) { showToast('⚠ 请先开启选中模式'); return; }
                if (selectedNotes.size === 0 && hoveredNoteIndex < 0) { showToast('请先选中Hold音符'); return; }
                let targetIdx = hoveredNoteIndex;
                if (selectedNotes.size === 1) targetIdx = [...selectedNotes][0];
                if (targetIdx < 0 || targetIdx >= chartData.notes.length) { showToast('请先选中一个音符'); return; }
                const note = chartData.notes[targetIdx];
                if (!isHoldNote(note)) { showToast('选中的音符不是Hold类型'); return; }
                const newDurStr = await showCustomPrompt('编辑Hold音符持续时间(秒):', note.d.toFixed(2), '编辑Hold时长');
                if (!newDurStr) return;
                const newDur = Math.max(0.05, parseFloat(newDurStr) || note.d);
                chartData.notes[targetIdx] = { t: note.t, d: newDur };
                updateStatusBar();
                showToast('✅ Hold时长已更新为 ' + newDur.toFixed(2) + 's');
            }

            function moveSelectedNotes(deltaSec) { if (!notesSelectionActive) { showToast('⚠ 请先开启选中模式'); return; } if (selectedNotes
                    .size === 0 && hoveredNoteIndex >= 0) { selectedNotes.add(hoveredNoteIndex); } if (selectedNotes.size === 0) {
                    showToast('请先选中音符'); return; } const indices = [...selectedNotes].filter(i => i < chartData.notes.length);
                for (const i of indices) { const note = chartData.notes[i]; const oldTime = getNoteTime(note); const newTime = Math
                        .max(0, Math.min(getEffectiveEndTime(), oldTime + deltaSec)); if (isHoldNote(note)) { chartData.notes[
                            i] = { t: Math.round(newTime * 1000) / 1000, d: note.d }; } else { chartData.notes[i] = Math.round(
                            newTime * 1000) / 1000; } }
                sortNotes();
                updateStatusBar();
                showToast('已移动 ' + indices.length + ' 个音符 (' + (deltaSec > 0 ? '+' : '') + (deltaSec * 1000).toFixed(0) +
                    'ms)'); }

            function selectAdjacentNote(direction) { if (!notesSelectionActive) { showToast('⚠ 请先开启选中模式'); return; } if (chartData
                    .notes.length === 0) { showToast('没有音符'); return; } let currentIdx = hoveredNoteIndex; if (currentIdx < 0 &&
                    selectedNotes.size === 1) currentIdx = [...selectedNotes][0]; if (currentIdx < 0 && chartData.notes.length >
                    0) { currentIdx = direction > 0 ? -1 : chartData.notes.length; } const newIdx = currentIdx + direction; if (
                    newIdx >= 0 && newIdx < chartData.notes.length) { selectedNotes.clear();
                    selectedNotes.add(newIdx);
                    hoveredNoteIndex = newIdx;
                    updateStatusBar();
                    showToast('已选中音符 #' + (newIdx + 1)); } else { showToast(direction > 0 ? '已是最后一个音符' : '已是第一个音符'); } }

            function applyDisplayRangePct(pct) { if (audioBuffer) { const coords = getWaveformCoords(); const drawWidth = coords
                        .width - 80; const duration = audioBuffer.duration; const targetPps = drawWidth / (duration * pct); const
                    basePps = drawWidth / Math.max(duration, 10);
                    viewZoom = targetPps / basePps; } else { viewZoom = pct; }
                viewZoom = Math.max(0.05, Math.min(40, viewZoom));

            function buildProjectData() {
                const data = {
                    id: currentProjectId || ('proj_' + Date.now()),
                    name: currentProjectName,
                    bpm: chartData.bpm,
                    offset: chartData.offset,
                    approachTime: chartData.approachTime,
                    audioFileName: chartData.audioFileName,
                    coverFileName: chartData.coverFileName || '',
                    coverDataUrl: coverImageDataUrl || '',
                    hitSoundDataUrl: chartData.hitSoundDataUrl || null,
                    hitSoundFileName: chartData.hitSoundFileName || '',
                    allowEdit: chartData.allowEdit !== undefined ? chartData.allowEdit : true,
                    difficulty: chartData.difficulty || '',
                    author: chartData.author || '',
                    description: chartData.description || '',
                    notes: chartData.notes.map(n => isHoldNote(n) ? { t: n.t, d: n.d } : (typeof n === 'number' ? n : n)),
                    cropStart: cropStart,
                    cropEnd: cropEnd,
                };
                if (originalAudioFile && audioBuffer) {
                    if (originalAudioArrayBuffer instanceof ArrayBuffer) {
                        data.audioData = new Uint8Array(originalAudioArrayBuffer);
                        data._rawAudioArrayBuffer = originalAudioArrayBuffer;
                    } else { data.audioData = audioBufferToArrayBufferStereo(audioBuffer); }
                }
                return data;
            }

            function audioBufferToArrayBufferStereo(audioBuf) { const numChannels = audioBuf.numberOfChannels; const sampleRate =
                    audioBuf.sampleRate; const length = audioBuf.length; const bitsPerSample = 16; const byteRate = sampleRate *
                    numChannels * bitsPerSample / 8; const blockAlign = numChannels * bitsPerSample / 8; const dataSize =
                    length * blockAlign; const headerSize = 44; const buffer = new ArrayBuffer(headerSize + dataSize); const
                    view = new DataView(buffer);
                writeString(view, 0, 'RIFF');
                view.setUint32(4, 36 + dataSize, true);
                writeString(view, 8, 'WAVE');
                writeString(view, 12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, numChannels, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, byteRate, true);
                view.setUint16(32, blockAlign, true);
                view.setUint16(34, bitsPerSample, true);
                writeString(view, 36, 'data');
                view.setUint32(40, dataSize, true);
                let offset = 44;
                if (numChannels === 1) { const chData = audioBuf.getChannelData(0); for (let i = 0; i < length; i++) { const s = Math
                        .max(-1, Math.min(1, chData[i]));
                        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                        offset += 2; } } else { const ch0 = audioBuf.getChannelData(0); const ch1 = audioBuf.getChannelData(1); for (
                        let i = 0; i < length; i++) { const s0 = Math.max(-1, Math.min(1, ch0[i]));
                        view.setInt16(offset, s0 < 0 ? s0 * 0x8000 : s0 * 0x7FFF, true);
                        offset += 2; const s1 = Math.max(-1, Math.min(1, ch1[i]));
                        view.setInt16(offset, s1 < 0 ? s1 * 0x8000 : s1 * 0x7FFF, true);
                        offset += 2; } }
                return new Uint8Array(buffer);
            }

            function writeString(view, offset, str) { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(
                    i)); }

                        ctx.fillStyle = 'rgba(255,255,255,0.5)';

                    ctx.font = `bold ${22*dpr}px "${getFontFamily()}"`;

                        ctx.font = `bold ${13*dpr}px "${getFontFamily()}"`;

                        judgedCount = gameState.notes.filter(n => n.judged).length; const progressRatio = totalNotes > 0 ?
                        judgedCount / totalNotes : 0; const progBarY = h - 18 * dpr; const progBarW = w * 0.6; const progBarX = (w -

                    ctx.fillStyle = '#999';
                    ctx.fillRect(progBarX, progBarY, progBarW * progressRatio, 3 * dpr);
                    ctx.fillStyle = '#ccc';
                    ctx.font = `${7*dpr}px "${getFontFamily()}"`;
                    ctx.fillText(judgedCount + ' / ' + totalNotes, w / 2, progBarY - 3 * dpr); if (chartData.difficulty ||
                        chartData.author) { ctx.fillStyle = '#888';
                        ctx.font = `${7*dpr}px "${getFontFamily()}"`;
                        ctx.fillText('难度: ' + (chartData.difficulty || '?') + ' | 作者: ' + (chartData.author || '匿名'), w / 2,
                            progBarY + 14 * dpr); } if (autoPlayActive) { ctx.fillStyle = '#ff6666';
                        ctx.font = `bold ${9*dpr}px "${getFontFamily()}"`;
                        ctx.fillText('🤖 AUTOPLAY', w / 2, progBarY + 28 * dpr); } else if (holdPressActive && gameState
                        .activeHoldId !== null) { ctx.fillStyle = 'rgba(68,204,255,0.3)';
                        ctx.fillRect(trackX - 30 * dpr, judgeLineY - 30 * dpr, 60 * dpr, 30 * dpr);
                        ctx.fillStyle = '#44ccff';
                        ctx.font = `bold ${9*dpr}px "${getFontFamily()}"`;
                        ctx.fillText('HOLD', trackX, judgeLineY - 8 * dpr); } } if (gameState.started && isPlaying && !
                    autoPlayActive) { checkAutoMisses(); } if (gameState.started) { checkGameEnd(); } }

            function getFontFamily() { return "'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"; }
            init();
            console.log('🎵 NoteBox v1.0.9 - 音符盒子');
